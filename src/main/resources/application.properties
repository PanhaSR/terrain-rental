# ===== Application =====
spring.application.name=terrain-rental
server.port=8080

# ===== MySQL Datasource =====
# Create the database first:  CREATE DATABASE terrain_rental;
spring.datasource.url=jdbc:mysql://localhost:3306/terrain_rental?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== JSON =====
spring.jackson.serialization.fail-on-empty-beans=false
